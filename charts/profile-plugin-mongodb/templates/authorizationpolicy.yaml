---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: mongodb-teknoir-system-allow
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: mongodb
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - "teknoir-system"
